<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Помогите Софийко, НЕ ОСТАВАЙТЕСЬ В СТОРОНЕ!!!</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <style>
      
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
        }

        body {
          
            background-image: url("pic1.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            font-family: "Arial Black", Gadget, sans-serif;
            
         
            display: flex;
            justify-content: left;
            align-items: left;
            padding: clamp(10px, 3vw, 40px);
        }

        .content {
            background-color: rgba(0, 0, 0, 0.2); 
            border-radius: clamp(12px, 2vw, 24px);
            padding: clamp(15px, 4vw, 40px);
            max-width: 750px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: left;
    
            gap: clamp(15px, 3vw, 30px); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px); 
        }

        h1 {
            -webkit-text-stroke: 1.5px #460785;
            text-shadow: 2px 2px 0px #460785;
            text-align: center;
            color: #ff00b3;
            
            font-size: clamp(20px, 4.5vw, 32px);
            line-height: 1.3;
            word-wrap: break-word;
            width: 100%;
        }

        /* Контейнер для картинки */
        .image-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        
        
        .image-container img {
            max-width: 400px;
            width: 85%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        

        .center-text {
            color: #00ffc8;
            font-size: clamp(16px, 3.8vw, 26px);
            text-align: center;
            line-height: 1.4;
            word-wrap: break-word;
            width: 100%;
        }

       
        @media (max-width: 1024px) {
            body {
                background-attachment: scroll;
            }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Привет, т/и!!! Нам очень нужна твоя помощь!!! Только ты можешь рассказать об этой проблеме 10 друзьям!!!!</h1>
        
        <div class="image-container">
            <img src="pic2.png" alt="Картинка">
        </div>
        
        <p class="center-text">
            Софийко - Маленькое Дитятко, Нужна Помощь, Рисунки Рисовать!!! Голосовать За Софийко Будет Добро!!!!
        </p>
    </div>

</body>
</html>
